<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="geckoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50"/>
      <stop offset="100%" style="stop-color:#1B4332"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#geckoGradient)"/>
  <!-- Gecko body -->
  <ellipse cx="50" cy="55" rx="18" ry="25" fill="#7BA05B"/>
  <!-- Gecko head -->
  <ellipse cx="50" cy="28" rx="14" ry="12" fill="#7BA05B"/>
  <!-- Eyes -->
  <circle cx="43" cy="25" r="5" fill="#1B4332"/>
  <circle cx="57" cy="25" r="5" fill="#1B4332"/>
  <circle cx="44" cy="24" r="2" fill="white"/>
  <circle cx="58" cy="24" r="2" fill="white"/>
  <!-- Smile -->
  <path d="M 42 32 Q 50 38 58 32" stroke="#1B4332" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Front legs -->
  <ellipse cx="32" cy="45" rx="8" ry="4" fill="#6B8E5A" transform="rotate(-30 32 45)"/>
  <ellipse cx="68" cy="45" rx="8" ry="4" fill="#6B8E5A" transform="rotate(30 68 45)"/>
  <!-- Back legs -->
  <ellipse cx="30" cy="68" rx="8" ry="4" fill="#6B8E5A" transform="rotate(-45 30 68)"/>
  <ellipse cx="70" cy="68" rx="8" ry="4" fill="#6B8E5A" transform="rotate(45 70 68)"/>
  <!-- Tail -->
  <path d="M 50 80 Q 55 90 65 88 Q 72 85 70 78" stroke="#7BA05B" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Spots on body -->
  <circle cx="45" cy="50" r="3" fill="#4CAF50" opacity="0.6"/>
  <circle cx="55" cy="55" r="2.5" fill="#4CAF50" opacity="0.6"/>
  <circle cx="48" cy="62" r="2" fill="#4CAF50" opacity="0.6"/>
  <circle cx="56" cy="48" r="2" fill="#4CAF50" opacity="0.6"/>
</svg>